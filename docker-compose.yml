version: '3.8'

services:
  nginx:
    image: nginx:1.27
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - fastapi
    mem_limit: 48m
    restart: unless-stopped

  fastapi:
    image: tiangolo/uvicorn-gunicorn-fastapi:python3.11
    volumes:
      - ./app:/app
    environment:
      - MODULE_NAME=main
      - VARIABLE_NAME=app
      - WEB_CONCURRENCY=1
      - WORKERS_PER_CORE=1
    depends_on:
      - redis
    mem_limit: 128m
    restart: unless-stopped

  redis:
    image: redis:7
    command: redis-server --maxmemory 90mb --maxmemory-policy allkeys-lru
    mem_limit: 80m
    restart: unless-stopped

networks:
  default:
    name: edge
